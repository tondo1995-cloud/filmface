<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>FilmFace</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f0f0f;
      color: white;
      text-align: center;
    }

    h1 {
      margin: 30px 0;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 30px;
      padding: 40px;
    }

    .card {
      background: #1c1c1c;
      border-radius: 12px;
      padding: 15px;
    }

    .card img {
      width: 100%;
      border-radius: 10px;
    }

    .card button {
      margin-top: 15px;
      padding: 10px 20px;
      border: none;
      background: white;
      color: black;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
    }

    .card button:hover {
      background: #ddd;
    }
  </style>
</head>

<body>

<h1>Diventa il protagonista del tuo film</h1>

<div class="grid">

  <!-- CARD 1 -->
  <div class="card">
    <img src="https://i.imgur.com/8Km9tLL.jpg">
    <p>Pulp Fiction</p>
    <a href="/customize.html?poster=pulp">
      <button>Personalizza</button>
    </a>
  </div>

  <!-- CARD 2 -->
  <div class="card">
    <img src="https://i.imgur.com/fY6Z8zM.jpg">
    <p>Wolf of Wall Street</p>
    <a href="/customize.html?poster=wolf">
      <button>Personalizza</button>
    </a>
  </div>

  <!-- CARD 3 -->
  <div class="card">
    <img src="https://i.imgur.com/3ZQ3Z6p.jpg">
    <p>Scarface</p>
    <a href="/customize.html?poster=scarface">
      <button>Personalizza</button>
    </a>
  </div>

</div>

</body>
</html>
