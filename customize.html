<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Personalizza</title>

  <style>
    body {
      margin: 0;
      background: #000;
      color: #fff;
      font-family: Arial, sans-serif;
      text-align: center;
    }

    .container {
      padding: 60px 20px;
    }

    h1 {
      font-size: 36px;
      margin-bottom: 30px;
    }

    input, button {
      padding: 15px;
      margin: 10px;
      font-size: 16px;
      border-radius: 6px;
      border: none;
    }

    input {
      width: 250px;
    }

    button {
      background: #FFD700;
      cursor: pointer;
      font-weight: bold;
    }
  </style>
</head>

<body>

  <div class="container">

    <h1>Carica la tua foto</h1>

    <form action="https://formspree.io/f/xgonrkoj" method="POST" enctype="multipart/form-data">

      <input type="file" name="foto" required><br>

      <input type="text" name="nome" placeholder="Nome attore" required><br>

      <button type="submit">Invia richiesta</button>

    </form>

  </div>

</body>
</html>
