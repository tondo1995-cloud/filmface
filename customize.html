<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <title>Customize</title>

  <style>
    body {
      background: black;
      color: white;
      font-family: Arial;
      text-align: center;
      padding: 40px;
    }

    input, button {
      padding: 12px;
      margin: 10px;
      width: 250px;
      border-radius: 8px;
      border: none;
    }

    button {
      background: white;
      cursor: pointer;
    }

    img {
      margin-top: 20px;
      max-width: 300px;
      border-radius: 10px;
    }

    .error {
      color: red;
      margin-top: 10px;
    }
  </style>
</head>

<body>

  <h1>Face Swap Generator</h1>

  <input type="file" id="imageInput" />
  <br />

  <input type="text" id="nameInput" placeholder="Your name" />
  <br />

  <button onclick="generate()">Generate</button>

  <div id="error" class="error"></div>

  <img id="resultImage" />

  <script>
    async function generate() {
      const fileInput = document.getElementById("imageInput");
      const nameInput = document.getElementById("nameInput");
      const errorDiv = document.getElementById("error");
      const resultImage = document.getElementById("resultImage");

      errorDiv.innerText = "";
      resultImage.src = "";

      const file = fileInput.files[0];
      const name = nameInput.value;

      // 🔥 prendiamo posterKey dall’URL
      const params = new URLSearchParams(window.location.search);
      const posterKey = params.get("poster");

      if (!file || !name || !posterKey) {
        errorDiv.innerText = "Compila tutti i campi";
        return;
      }

      try {
        const formData = new FormData();

        formData.append("image", file);
        formData.append("name", name);
        formData.append("posterKey", posterKey);

        const response = await fetch("/api/generate", {
          method: "POST",
          body: formData,
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || "Errore");
        }

        resultImage.src = data.result;

      } catch (err) {
        errorDiv.innerText = err.message;
      }
    }
  </script>

</body>
</html>
