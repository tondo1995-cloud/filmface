<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Personalizza</title>

  <style>
    body {
      margin: 0;
      background: #000;
      color: #fff;
      font-family: Arial, sans-serif;
      text-align: center;
    }

    .container {
      padding: 60px 20px;
    }

    h1 {
      font-size: 36px;
      margin-bottom: 30px;
    }

    input, button {
      padding: 15px;
      margin: 10px;
      font-size: 16px;
      border-radius: 6px;
      border: none;
    }

    input {
      width: 300px;
      max-width: 90%;
    }

    button {
      background: #FFD700;
      cursor: pointer;
      font-weight: bold;
    }
  </style>
</head>

<body>

<div class="container">

  <h1>Inserisci il link della tua foto</h1>

  <form id="form">
    <input type="text" name="foto" placeholder="Link Google Drive / WeTransfer" required><br>
    <input type="text" name="nome" placeholder="Nome attore" required><br>
    <button type="submit">Invia richiesta</button>
  </form>

</div>

<script>
  const form = document.getElementById("form");

  form.addEventListener("submit", function(e) {
    e.preventDefault();

    const data = new FormData(form);

    fetch("https://formspree.io/f/xgonrkoj", {
      method: "POST",
      body: data,
      headers: {
        'Accept': 'application/json'
      }
    }).then(() => {
      window.location.href = "https://filmface.studio/thanks.html";
    }).catch(() => {
      alert("Errore invio. Riprova.");
    });
  });
</script>

</body>
</html>
